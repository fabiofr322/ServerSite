<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR32SURVIVAL - Em Breve</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0d001a;
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
            position: relative;
        }

        /* Fundo animado com gradiente */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(139, 0, 255, 0.25) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 50%, rgba(255, 20, 147, 0.25) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 100%, rgba(139, 0, 255, 0.15) 0%, transparent 50%);
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Grid de fundo */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(139, 0, 255, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 20, 147, 0.06) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            pointer-events: none;
        }

        /* Canvas de partículas */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Container principal */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        /* Logo / Título */
        .logo {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(1.5rem, 5vw, 3rem);
            background: linear-gradient(135deg, #ff1493, #8b00ff, #ff1493);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite, glitch 4s infinite;
            text-shadow: none;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            position: relative;
        }

        .logo::after {
            content: 'FR32SURVIVAL';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff1493, #8b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.3;
            animation: glitchOffset 4s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            91% { transform: translate(-2px, 1px); }
            92% { transform: translate(2px, -1px); }
            93% { transform: translate(0); }
        }

        @keyframes glitchOffset {
            0%, 90%, 100% { transform: translate(0); }
            91% { transform: translate(3px, -1px); }
            92% { transform: translate(-3px, 1px); }
            93% { transform: translate(0); }
        }

        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            color: #ff1493;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Contagem Regressiva */
        .countdown-container {
            display: flex;
            gap: clamp(0.5rem, 2vw, 1.5rem);
            margin-bottom: 3rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 1s ease 0.6s both;
        }

        .countdown-item {
            background: rgba(139, 0, 255, 0.15);
            border: 1px solid rgba(255, 20, 147, 0.4);
            border-radius: 16px;
            padding: clamp(1rem, 3vw, 2rem);
            min-width: clamp(80px, 15vw, 140px);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .countdown-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 20, 147, 0.15), transparent);
            transition: left 0.5s ease;
        }

        .countdown-item:hover::before {
            left: 100%;
        }

        .countdown-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(139, 0, 255, 0.4);
            border-color: rgba(255, 20, 147, 0.7);
        }

        .countdown-number {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, #ff1493, #8b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-bottom: 0.5rem;
        }

        .countdown-label {
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Data de lançamento */
        .launch-date {
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease 0.9s both;
        }

        .launch-date span {
            color: #ff1493;
            font-weight: 700;
        }

        /* Botões / Links */
        .buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 1s ease 1.2s both;
        }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff1493, #8b00ff);
            color: #fff;
            box-shadow: 0 4px 30px rgba(255, 20, 147, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 40px rgba(255, 20, 147, 0.7);
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(139, 0, 255, 0.6);
        }

        .btn-secondary:hover {
            background: rgba(139, 0, 255, 0.25);
            border-color: #ff1493;
            transform: translateY(-3px);
        }

        /* IP do servidor */
        .server-ip {
            margin-top: 3rem;
            padding: 1rem 2rem;
            background: rgba(139, 0, 255, 0.15);
            border: 1px solid rgba(255, 20, 147, 0.4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: fadeInUp 1s ease 1.5s both;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .server-ip:hover {
            border-color: rgba(255, 20, 147, 0.7);
            box-shadow: 0 0 30px rgba(139, 0, 255, 0.3);
        }

        .server-ip-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .server-ip-value {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            color: #ff1493;
        }

        .copy-hint {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-left: 0.5rem;
        }

        /* Footer */
        footer {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
        }

        footer a {
            color: rgba(255, 20, 147, 0.7);
            text-decoration: none;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #ff1493, #8b00ff);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 10px 40px rgba(255, 20, 147, 0.5);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsivo */
        @media (max-width: 600px) {
            .countdown-container {
                gap: 0.5rem;
            }
            .countdown-item {
                min-width: 70px;
                padding: 1rem;
            }
            .buttons {
                flex-direction: column;
                width: 100%;
                max-width: 300px;
            }
            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>
    <canvas id="particles"></canvas>

    <div class="container">
        <h1 class="logo">FR32SURVIVAL</h1>
        <p class="subtitle">O Survival vai mudar</p>

        <div class="countdown-container">
            <div class="countdown-item">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">Dias</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">Horas</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">Minutos</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">Segundos</span>
            </div>
        </div>

        <p class="launch-date">
            Lançamento em <span>10 de Julho às 13:00</span>
        </p>

        <div class="buttons">
            <a href="#" class="btn btn-primary">Discord</a>
            <a href="#" class="btn btn-secondary">Instagram</a>
        </div>

        <div class="server-ip" onclick="copyIP()">
            <span class="server-ip-label">IP do Servidor</span>
            <span class="server-ip-value" id="ipText">fr32survival.com</span>
            <span class="copy-hint">(clique para copiar)</span>
        </div>
    </div>

    <footer>
        FR32SURVIVAL &copy; 2026. Não é afiliado à Mojang Studios.
    </footer>

    <div class="toast" id="toast">IP copiado para a área de transferência!</div>

    <script>
        // Contagem Regressiva para 10 de Julho de 2026 às 13:00
        const targetDate = new Date('2026-07-10T13:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        // Copiar IP
        function copyIP() {
            const ip = document.getElementById('ipText').textContent;
            navigator.clipboard.writeText(ip).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            });
        }

        // Partículas de fundo
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.color = Math.random() > 0.5 ? '255, 20, 147' : '139, 0, 255';
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
    </script>
</body>
</html>
